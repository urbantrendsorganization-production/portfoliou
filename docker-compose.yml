services:
  # ── PostgreSQL ──
  portfoliou-db:
    image: postgres:16-alpine
    container_name: portfoliou-db
    restart: unless-stopped
    volumes:
      - portfoliou_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5438:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfoliou}
      POSTGRES_USER: ${POSTGRES_USER:-portfoliou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfoliou}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portfoliou-net

  # ── Redis (for WebSocket channel layer) ──
  portfoliou-redis:
    image: redis:7-alpine
    container_name: portfoliou-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portfoliou-net

  # ── Django Backend (Daphne ASGI) ──
  portfoliou-backend:
    build:
      context: ./backend
    image: portfoliou-backend
    container_name: portfoliou-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8004:8000"
    volumes:
      - portfoliou_media_data:/app/media
    env_file: .env.production
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-portfoliou}:${POSTGRES_PASSWORD}@portfoliou-db:5432/${POSTGRES_DB:-portfoliou}
      REDIS_URL: redis://portfoliou-redis:6379/0
    depends_on:
      portfoliou-db:
        condition: service_healthy
      portfoliou-redis:
        condition: service_healthy
    networks:
      - portfoliou-net

  # ── Next.js Frontend ──
  portfoliou-frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:8080}
    image: portfoliou-frontend
    container_name: portfoliou-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3000"
    env_file: .env.production
    environment:
      BACKEND_INTERNAL_URL: http://portfoliou-backend:8000/api
    depends_on:
      - portfoliou-backend
    networks:
      - portfoliou-net

  # ── Nginx Reverse Proxy ──
  portfoliou-nginx:
    image: nginx:alpine
    container_name: portfoliou-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portfoliou-frontend
      - portfoliou-backend
    networks:
      - portfoliou-net

volumes:
  portfoliou_postgres_data:
  portfoliou_media_data:

networks:
  portfoliou-net:
    name: portfoliou-net
